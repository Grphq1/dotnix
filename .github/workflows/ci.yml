name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Setup magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Flake check
        run: nix flake check --show-trace

      - name: Check formatting
        run: nix fmt -- --check .

      - name: Build NixOS configs (dry/eval)
        run: nix build .#nixosConfigurations --no-link --print-out-paths || true

      - name: Build home-manager config
        run: nix build .#homeConfigurations.alirezam.activationPackage --no-link || true
